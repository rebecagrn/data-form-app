services:
  postgres:
    image: postgres:16-alpine
    container_name: data-form-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dataform
      POSTGRES_PASSWORD: dataform
      POSTGRES_DB: dataform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dataform -d dataform']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
