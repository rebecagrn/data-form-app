services:
  postgres:
    image: postgres:16-alpine
    container_name: data-form-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dataform
      POSTGRES_PASSWORD: dataform
      POSTGRES_DB: dataform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dataform -d dataform']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: data-form-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TYPEORM_SYNCHRONIZE: 'true'
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: dataform
      DATABASE_PASSWORD: dataform
      DATABASE_NAME: dataform
      CORS_ORIGIN: http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: data-form-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  postgres_data:
